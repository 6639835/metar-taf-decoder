name: Bug report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the
        fields below so we can reproduce and fix the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: report-input
    attributes:
      label: Input METAR/TAF
      description: The exact METAR or TAF string that triggers the issue.
      placeholder: "METAR KJFK 061751Z 28008KT 10SM FEW250 22/18 A2992"
      render: text
    validations:
      required: false
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or CLI invocation that demonstrates the bug.
      placeholder: |
        ```python
        from weather_decoder import MetarDecoder
        MetarDecoder().decode("...")
        ```
      render: markdown
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full traceback if an exception was raised.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: weather-decoder version
      placeholder: "1.1.4"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.2"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that might help (related references, logs, screenshots).
    validations:
      required: false
