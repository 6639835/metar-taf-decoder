name: Feature request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the use case so
        we can evaluate the request.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What are you trying to do? What's missing or hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, CLI, or behaviour you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative designs you've thought about.
    validations:
      required: false
  - type: textarea
    id: references
    attributes:
      label: References
      description: |
        Links to relevant standards (WMO 306, ICAO Annex 3, FMH-1, CAP 746),
        sample reports, or prior art.
    validations:
      required: false
